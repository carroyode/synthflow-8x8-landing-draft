<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synthflow for 8x8 — Landing Page Draft v2</title>
<style>
  :root{
    --ink:#0B0B0E;
    --ink-soft:#4A4A52;
    --line:#E6E5E0;
    --bg:#FDFDFB;
    --card:#FFFFFF;
    --accent:#0B0B0E;
    --accent-soft:#F1F0EC;
    --pill:#F1F0EC;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.5;
  }
  .draft-banner{
    background:#FFF7E0;
    border-bottom:1px solid #E8D9A0;
    color:#6B5A16;
    font-size:13px;
    padding:10px 24px;
    text-align:center;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 48px;
    border-bottom:1px solid var(--line);
  }
  .lockup{display:flex;align-items:center;gap:14px;}
  .logo{
    font-weight:700;
    font-size:18px;
    letter-spacing:-0.02em;
  }
  .x{color:#B5B4AC;font-size:16px;}
  nav a{
    color:var(--ink-soft);
    text-decoration:none;
    font-size:14px;
    margin-left:28px;
  }
  .cta-btn{
    background:var(--ink);
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .ghost-btn{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--line);
    padding:10px 20px;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  .hero{
    max-width:760px;
    margin:0 auto;
    text-align:center;
    padding:72px 24px 48px;
  }
  .badge{
    display:inline-block;
    background:var(--pill);
    color:var(--ink-soft);
    font-size:12px;
    font-weight:600;
    padding:6px 14px;
    border-radius:20px;
    margin-bottom:20px;
  }
  h1{
    font-size:40px;
    line-height:1.15;
    letter-spacing:-0.02em;
    margin:0 0 16px;
  }
  .sub{
    font-size:17px;
    color:var(--ink-soft);
    max-width:560px;
    margin:0 auto 32px;
  }
  .hero-actions{display:flex;gap:12px;justify-content:center;}
  section{
    max-width:1040px;
    margin:0 auto;
    padding:56px 24px;
    border-top:1px solid var(--line);
  }
  .eyebrow{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:8px;
  }
  h2{
    font-size:26px;
    letter-spacing:-0.01em;
    margin:0 0 12px;
  }
  .section-sub{
    color:var(--ink-soft);
    font-size:15px;
    max-width:640px;
    margin:0 0 32px;
  }
  .sandbox{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px;
    display:grid;
    grid-template-columns:260px 1fr;
    gap:24px;
  }
  .vert-list{display:flex;flex-direction:column;gap:6px;}
  .vert-pill{
    padding:9px 14px;
    border-radius:8px;
    font-size:14px;
    border:1px solid transparent;
  }
  .vert-pill.active{
    background:var(--accent-soft);
    border-color:var(--line);
    font-weight:600;
  }
  .chat-panel{
    background:var(--accent-soft);
    border-radius:12px;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .bubble{
    max-width:78%;
    padding:10px 14px;
    border-radius:12px;
    font-size:14px;
  }
  .bubble.agent{
    background:#fff;
    border:1px solid var(--line);
    align-self:flex-start;
  }
  .bubble.user{
    background:var(--ink);
    color:#fff;
    align-self:flex-end;
  }
  .tiers{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
  }
  .tier-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:28px;
  }
  .tier-card.enterprise{border-color:var(--ink);}
  .tier-tag{
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-bottom:10px;
  }
  .tier-price{font-size:22px;font-weight:700;margin-bottom:4px;}
  .tier-note{font-size:13px;color:var(--ink-soft);margin-bottom:20px;}
  ul.feat{list-style:none;margin:0;padding:0;}
  ul.feat li{
    font-size:14px;
    padding:8px 0;
    border-top:1px solid var(--line);
    display:flex;
    gap:8px;
  }
  ul.feat li:first-child{border-top:none;}
  .check{color:#1D9E75;font-weight:700;}
  .ps-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
  }
  .ps-card{
    background:var(--card);
    border:1px solid var(--line);
